[routes]
GET / = Controllers\HomeController->index

GET /faqs = Controllers\FaqController->index
POST /faqs = Controllers\FaqController->store
GET /faqs/@id = Controllers\FaqController->edit
PUT /faqs/@id = Controllers\FaqController->update
DELETE /faqs/@id = Controllers\FaqController->destroy

GET /stacks = Controllers\TechStackController->index
POST /stacks = Controllers\TechStackController->store
GET /stacks/@id = Controllers\TechStackController->edit
PUT /stacks/@id = Controllers\TechStackController->update
DELETE /stacks/@id = Controllers\TechStackController->destroy
