[routes]
GET /api = Http\Controllers\HomeController->index

GET /api/projects/@slug = Http\Controllers\ProjectController->edit
PUT /api/projects/@slug = Http\Controllers\ProjectController->update

GET /api/modules/@project_id = Http\Controllers\ModuleController->index

POST /api/login = Http\Controllers\SessionController->store
POST /api/verify = Http\Controllers\SessionController->show
DELETE /api/logout = Http\Controllers\SessionController->destroy

POST /api/email = Http\Controllers\EmailController->store
