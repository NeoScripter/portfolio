name: deploy

on:
  push:
    branches:
      - develop
      - main
  # workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: 144.31.68.92
          port: 22
          username: ilya
          key: ${{ secrets.PRIVATE_KEY }}
          script_stop: true
          script: |
            cd www/portfolio && \
            git pull origin main && \
            cd client && \
            /home/ilya/.local/share/pnpm/pnpm install && \
            /home/ilya/.local/share/pnpm/pnpm run build && \
            sudo service php8.5-fpm reload

